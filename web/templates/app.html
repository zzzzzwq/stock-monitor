<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>盯盘助手</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;color:#333;font-size:14px}
.header{background:#1a1a2e;color:#fff;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100}
.header h1{font-size:18px;font-weight:600}
.header .user-info{font-size:12px;opacity:.8;cursor:pointer}
.container{padding:12px;max-width:600px;margin:0 auto}
.card{background:#fff;border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.card-title{font-size:15px;font-weight:600;color:#1a1a2e;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f5f5f5}
.row:last-child{border-bottom:none}
.name{font-size:14px;color:#555}
.price{font-size:15px;font-weight:600}
.price.up{color:#e74c3c}.price.down{color:#27ae60}
.tag{font-size:12px;padding:2px 8px;border-radius:4px;font-weight:500}
.tag.up{background:#fce4e4;color:#e74c3c}
.tag.down{background:#e8f5e9;color:#27ae60}
.tag.neutral{background:#f5f5f5;color:#999}
.btn{padding:10px 20px;border:none;border-radius:8px;font-size:14px;cursor:pointer;display:inline-block}
.btn-primary{background:#1a1a2e;color:#fff;width:100%}
.btn-sm{background:#e8f4fd;color:#3498db;padding:4px 12px;font-size:12px;border-radius:4px;border:none;cursor:pointer}
.btn-danger{background:#fce4e4;color:#e74c3c;padding:4px 12px;font-size:12px;border-radius:4px;border:none;cursor:pointer}
.btn-cancel{background:#f5f5f5;color:#666;padding:10px 20px;border:none;border-radius:8px;font-size:14px;cursor:pointer}
input,select{width:100%;padding:10px 12px;border:1px solid #e0e0e0;border-radius:8px;font-size:14px;margin-bottom:10px;background:#fff}
label{display:block;font-size:13px;color:#666;margin-bottom:4px}
.form-group{margin-bottom:12px}
.form-row{display:flex;gap:10px}
.form-row>*{flex:1}
.modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:200;align-items:center;justify-content:center}
.modal.show{display:flex}
.modal-content{background:#fff;border-radius:16px;padding:20px;width:90%;max-width:420px;max-height:85vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:600;margin-bottom:16px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px;color:#999;font-weight:500;border-bottom:1px solid #eee}
td{padding:8px;border-bottom:1px solid #f5f5f5}
.loading{text-align:center;padding:40px;color:#999}
.login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;padding:40px 20px}
.login-screen h2{font-size:28px;margin-bottom:8px;color:#1a1a2e}
.login-screen p{color:#999;margin-bottom:32px;font-size:14px}
.login-form{width:100%;max-width:320px}
.empty-state{text-align:center;padding:32px 0;color:#999;font-size:14px}
.tab-bar{display:flex;background:#fff;border-top:1px solid #eee;position:sticky;bottom:0;z-index:100}
.tab{flex:1;text-align:center;padding:10px;font-size:12px;color:#999;cursor:pointer;border:none;background:none}
.tab.active{color:#1a1a2e;font-weight:600;border-top:2px solid #1a1a2e}
.page{display:none}
.page.active{display:block}

/* Analysis specific */
.section-indent{border-left:3px solid #1a1a2e;padding-left:12px;margin-bottom:8px}
.flow-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin:8px 0}
.flow-item{background:#fafafa;border-radius:8px;padding:8px;text-align:center}
.flow-item .val{font-size:16px;font-weight:600}
.flow-item .lbl{font-size:11px;color:#999;margin-top:2px}
.score-badge{display:inline-block;padding:2px 10px;border-radius:10px;font-size:13px;font-weight:600}
.score-badge.pos{background:#e8f5e9;color:#27ae60}
.score-badge.neg{background:#fce4e4;color:#e74c3c}
.score-badge.zero{background:#f5f5f5;color:#999}
.tech-mini{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin:6px 0}
.tech-mini div{background:#fafafa;border-radius:6px;padding:6px;text-align:center;font-size:12px}
.tech-mini .v{font-weight:600;font-size:14px;margin-top:2px}
.signal-chip{display:inline-block;font-size:11px;padding:2px 8px;border-radius:10px;margin:2px;background:#f0f0f0}
.signal-chip.bull{background:#e8f5e9;color:#27ae60}
.signal-chip.bear{background:#fce4e4;color:#e74c3c}
.board-list{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.board-item{display:flex;justify-content:space-between;padding:4px 8px;border-radius:4px;font-size:12px;background:#fafafa}
.index-tech{display:flex;gap:8px;overflow-x:auto;padding:4px 0}
.index-tech-item{min-width:120px;background:#fafafa;border-radius:8px;padding:8px;text-align:center;font-size:12px}
.index-tech-item .nm{font-weight:600;font-size:13px}
.index-tech-item .st{font-size:11px;color:#666;margin-top:2px}

/* Stock detail card in holdings list */
.stock-card{cursor:pointer;border:1px solid #f0f0f0;border-radius:10px;padding:12px;margin-bottom:8px}
.stock-card:active{background:#fafafa}
.stock-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.stock-name{font-weight:600;font-size:15px}
.stock-price{font-size:16px;font-weight:700}
.stock-indicators{display:flex;gap:8px;flex-wrap:wrap;font-size:11px;color:#666}
.stock-indicators span{background:#f5f5f5;padding:2px 8px;border-radius:4px}
.stock-signals{margin-top:6px}
@media(prefers-color-scheme:dark){body{background:#111;color:#ddd}.card{background:#1a1a1a}.header{background:#0d0d1a}.tab-bar{background:#1a1a1a;border-top-color:#333}.tab.active{color:#fff}.modal-content{background:#1a1a1a}.btn-primary{background:#3498db}input,select{background:#222;color:#ddd;border-color:#444}th{color:#888}.btn-cancel{background:#333;color:#ccc}.flow-item,.tech-mini div,.index-tech-item,.board-item,.stock-indicators span,.stock-card{background:#222}.stock-card{border-color:#333}}
</style>
</head>
<body>

<div class="header">
  <h1>📊 盯盘助手</h1>
  <span class="user-info" id="userInfo" onclick="switchTab('settings')">未登录</span>
</div>

<div class="container" id="loginScreen">
  <div class="login-screen">
    <h2>📊 盯盘助手</h2>
    <p>A股智能盯盘分析工具</p>
    <div class="login-form">
      <form id="loginForm" onsubmit="return doLogin()">
        <input type="text" id="loginName" placeholder="输入昵称" value="用户" required>
        <button type="submit" class="btn btn-primary">登录</button>
      </form>
    </div>
  </div>
</div>

<div id="appMain" style="display:none">
  <div class="container">
    <!-- DASHBOARD PAGE -->
    <div id="pageDashboard" class="page active">
      <div id="statusBar" class="card" style="padding:10px 16px;font-size:13px;text-align:center"></div>

      <!-- 报告容器 -->
      <div id="reportLoading" class="loading" style="padding:40px">加载中...</div>
      <div id="reportContent" style="display:none">
        <!-- 大盘指数表格 -->
        <div class="card" id="indexTableCard">
          <div class="card-title">📊 大盘指数</div>
          <table style="width:100%" id="indexTable"><tr><th>指数</th><th style="text-align:right">点位</th><th style="text-align:right">涨跌幅</th></tr></table>
        </div>

        <!-- 持仓总盈亏 -->
        <div class="card" id="pnlSummaryCard" style="display:none">
          <div id="pnlSummaryText" style="text-align:center;font-size:24px;font-weight:700"></div>
        </div>

        <!-- 持仓明细 + 总结 -->
        <div id="holdingsReport"></div>

        <!-- 板块 + 资金流向 -->
        <div class="card" id="extraCard" style="display:none">
          <div class="card-title">📂 板块 & 资金</div>
          <div id="extraContent"></div>
        </div>

        <!-- 总总结 -->
        <div class="card" id="finalSummaryCard" style="display:none">
          <div class="card-title">📝 总结</div>
          <div id="finalSummaryText" style="font-size:14px;line-height:1.8;color:#555"></div>
        </div>
      </div>

      <!-- 无持仓 -->
      <div id="reportEmpty" class="empty-state" style="display:none">
        <p>还没有持仓</p>
        <button class="btn btn-primary" style="width:auto;margin-top:12px" onclick="switchTab('holdings')">添加持仓</button>
      </div>
    </div>

    <!-- HOLDINGS PAGE -->
    <div id="pageHoldings" class="page">
      <button class="btn btn-primary" onclick="showHoldingForm()">+ 添加持仓</button>
      <div style="margin-top:12px" id="holdingsTable"></div>
      <div id="holdingsEmpty" class="empty-state" style="display:none">还没有持仓</div>
    </div>

    <!-- SETTINGS PAGE -->
    <div id="pageSettings" class="page">
      <div class="card">
        <div class="card-title">👤 用户信息</div>
        <p id="userDetail" style="font-size:13px;color:#666"></p>
      </div>
      <div class="card">
        <div class="card-title">🔔 通知配置</div>
        <div class="form-group">
          <label>企业微信 Webhook</label>
          <input type="url" id="wechatUrl" placeholder="https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=...">
        </div>
        <div class="form-group">
          <label>钉钉 Webhook</label>
          <input type="url" id="dingtalkUrl" placeholder="https://oapi.dingtalk.com/robot/send?access_token=...">
        </div>
        <div class="form-group">
          <label>@手机号（逗号分隔）</label>
          <input type="text" id="atMobiles" placeholder="13800138000">
        </div>
        <button class="btn btn-primary" onclick="saveNotify()">保存</button>
      </div>
      <div class="card">
        <button class="btn" style="width:100%;color:#e74c3c;background:#fce4e4;border:none;padding:10px;border-radius:8px;cursor:pointer" onclick="logout()">退出登录</button>
      </div>
    </div>
  </div>

  <div class="tab-bar">
    <button class="tab active" onclick="switchTab('dashboard')">📊 分析</button>
    <button class="tab" onclick="switchTab('holdings')">📋 持仓</button>
    <button class="tab" onclick="switchTab('settings')">⚙️ 设置</button>
  </div>
</div>

<div class="modal" id="modal">
  <div class="modal-content" id="modalBody"></div>
</div>

<script>
const API = '/api';
let token = localStorage.getItem('token') || '';
let user = null;

function api(method, path, data) {
  return fetch(API + path, {
    method,
    headers: { 'Content-Type': 'application/json', ...(token ? {'Authorization': 'Bearer '+token} : {}) },
    body: data ? JSON.stringify(data) : undefined
  }).then(r => {
    if (r.status === 401) { localStorage.removeItem('token'); token=''; showLogin(); throw new Error('unauth'); }
    return r.json().then(d => r.ok ? d : Promise.reject(d));
  });
}

function showLogin() { document.getElementById('loginScreen').style.display='block'; document.getElementById('appMain').style.display='none'; }
function showApp() { document.getElementById('loginScreen').style.display='none'; document.getElementById('appMain').style.display='block'; }

function doLogin() {
  const name = document.getElementById('loginName').value || '用户';
  api('POST', '/auth/dev-login', {nickname: name, id: Date.now()}).then(d => {
    token = d.token; user = d.user; localStorage.setItem('token', token);
    showApp(); refreshAll();
  }).catch(e => alert('登录失败'));
  return false;
}

function logout() { localStorage.removeItem('token'); token = ''; showLogin(); }

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page'+tab.charAt(0).toUpperCase()+tab.slice(1)).classList.add('active');
  event.target.classList.add('active');
  if (tab==='dashboard') refreshAll();
  if (tab==='holdings') loadHoldings();
  if (tab==='settings') loadSettings();
}

function refreshAll() {
  document.getElementById('userInfo').textContent = user?.nickname || '已登录';
  loadReport();
  loadEnvironment();
}

// === 主报告：表格 + 总结 ===
function loadReport() {
  api('GET', '/analysis/report').then(d => {
    const rc = document.getElementById('reportContent');
    const rl = document.getElementById('reportLoading');
    const re = document.getElementById('reportEmpty');

    if (!d.holdings || !d.holdings.length) {
      rl.style.display = 'none';
      re.style.display = 'block';
      return;
    }

    rl.style.display = 'none';
    re.style.display = 'none';
    rc.style.display = 'block';

    document.getElementById('statusBar').innerHTML = d.summary ? '📈 非交易时间' : '📊 非交易时间';

    // 大盘指数表
    const idxTbody = document.getElementById('indexTable').querySelector('tbody') || document.getElementById('indexTable');
    const idxData = d.indices || {};
    const idxEntries = Object.entries(idxData);
    if (idxEntries.length) {
      idxTbody.innerHTML = '<tr><th>指数</th><th style="text-align:right">点位</th><th style="text-align:right">涨跌幅</th></tr>' +
        idxEntries.map(([name, v]) =>
          `<tr><td><b>${name}</b></td><td style="text-align:right">${v.price.toFixed(2)}</td><td style="text-align:right"><span class="${v.change_pct>0?'up':'down'}">${v.change_pct>0?'↑':'↓'} ${v.change_pct>0?'+':''}${v.change_pct.toFixed(2)}%</span></td></tr>`
        ).join('');
    }

    // 总盈亏
    const pnl = d.summary?.total_pnl || 0;
    const pnlEl = document.getElementById('pnlSummaryText');
    pnlEl.textContent = `总持仓盈亏: ${pnl>=0?'+':''}${pnl.toFixed(0)} 元`;
    pnlEl.className = pnl>=0?'up':'down';
    pnlEl.style.cssText = 'text-align:center;font-size:24px;font-weight:700;padding:16px';
    document.getElementById('pnlSummaryCard').style.display = 'block';

    // 持仓明细 + 多维总结
    const insights = d.insights || {};
    const hEl = document.getElementById('holdingsReport');
    hEl.innerHTML = (d.holdings||[]).map(h => {
      const ins = insights[h.code] || {};
      return `<div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <div><b style="font-size:16px">${h.name}</b> <span style="color:#999;font-size:12px">${h.code}</span></div>
          <div><span style="font-size:18px;font-weight:700" class="${h.change_pct>0?'up':'down'}">${h.price.toFixed(2)}</span> <span class="tag ${h.change_pct>0?'up':'down'}">${h.change_pct>0?'+':''}${h.change_pct.toFixed(2)}%</span></div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:13px;color:#666;margin-bottom:8px">
          <span>持仓 ${h.shares}股</span>
          <span>均价 ${h.cost}</span>
          <span>日内 ${h.low.toFixed(2)} ~ ${h.high.toFixed(2)}</span>
          <span>浮亏 ${ins.pnl_value ? (ins.pnl_value>0?'+':'')+ins.pnl_value.toFixed(0) : '--'}</span>
        </div>
        ${ins.status ? `<div style="margin-bottom:8px"><span class="tag ${ins.pnl_pct<=-5?'down':ins.pnl_pct>0?'up':'neutral'}">${ins.status}</span> <span class="tag neutral">${ins.position}</span></div>` : ''}
        ${ins.intraday_analysis ? `<div style="font-size:13px;color:#555;margin-bottom:6px">📊 ${ins.intraday_analysis}</div>` : ''}
        ${ins.tech_summary ? `<div style="font-size:12px;color:#888;margin-bottom:8px">🔬 ${ins.tech_summary}</div>` : ''}
        ${(ins.key_points||[]).length ? `<div style="font-size:13px;margin-bottom:8px">${ins.key_points.map(k => `<span class="signal-chip">${k}</span>`).join(' ')}</div>` : ''}
        ${ins.forward_advice ? `<div style="font-size:14px;font-weight:600;padding:8px 12px;background:#f0f4ff;border-radius:8px;color:#1a1a2e">${ins.forward_advice}</div>` : ''}
        <div style="text-align:right;margin-top:6px"><button class="btn-sm" onclick="showStock('${h.code}')">详细分析 →</button></div>
      </div>`;
    }).join('');

    // 提取总结文本
    if (d.report) {
      const lines = d.report.split('\n');
      const summaryIdx = lines.findIndex(l => l.includes('【总结】'));
      const sepIdx = lines.findIndex(l => l.includes('━━━'));
      if (summaryIdx >= 0) {
        const summaryLines = [];
        for (let i = summaryIdx + 1; i < (sepIdx > summaryIdx ? sepIdx : lines.length); i++) {
          if (lines[i].trim()) summaryLines.push(lines[i].trim());
        }
        if (summaryLines.length) {
          document.getElementById('finalSummaryText').innerHTML = summaryLines.join('<br>');
          document.getElementById('finalSummaryCard').style.display = 'block';
        }
      }
    }

    // 板块 + 资金
    api('GET', '/analysis/market').then(m => {
      const ec = document.getElementById('extraContent');
      let html = '';
      const flow = m.sentiment?.fund_flow;
      if (flow) {
        html += '<div style="margin-bottom:8px"><b style="font-size:12px">💰 资金流向（亿）</b><div class="flow-grid">' +
          [{l:'主力',v:flow.main_net},{l:'超大单',v:flow.super_large_net},{l:'大单',v:flow.large_net},{l:'中单',v:flow.medium_net},{l:'小单',v:flow.small_net}]
          .map(x => `<div class="flow-item"><div class="val ${x.v>=0?'up':'down'}">${x.v>0?'+':''}${x.v}</div><div class="lbl">${x.l}</div></div>`).join('') +
          '</div></div>';
      }
      const boards = m.top_boards || {};
      if ((boards.top||[]).length) {
        html += '<b style="font-size:12px">📂 领涨板块</b><div class="board-list" style="margin-top:4px">' +
          (boards.top||[]).slice(0,5).map(b => `<div class="board-item"><span>${b.name}</span><span class="tag up">+${b.change_pct}%</span></div>`).join('') +
          '</div>';
      }
      if (html) {
        document.getElementById('extraCard').style.display = 'block';
        ec.innerHTML = html;
      }
    }).catch(() => {});
  }).catch(() => {});
}

// === 大盘补充（用于 loadReport 之后） ===
function loadEnvironment() {
  api('GET', '/analysis/market').then(d => {
    const flow = d.sentiment?.fund_flow;
    if (!flow) return;
  }).catch(() => {});
}

// === Holdings ===
function loadHoldings() {
  api('GET', '/holdings').then(h => {
    const el = document.getElementById('holdingsTable');
    const empty = document.getElementById('holdingsEmpty');
    if (!h.length) { el.innerHTML = ''; empty.style.display='block'; return; }
    empty.style.display='none';
    el.innerHTML = `<table><tr><th>名称</th><th>持仓</th><th>成本</th><th></th></tr>${h.map(x =>
      `<tr><td><b>${x.name}</b><br><span style="font-size:11px;color:#999">${x.code}</span></td><td>${x.shares}股</td><td>${x.cost_per_share}</td><td><button class="btn-sm" onclick="showStock('${x.code}')">分析</button> <button class="btn-danger" onclick="deleteHolding(${x.id})">删</button></td></tr>`
    ).join('')}</table>`;
  }).catch(() => {});
}
function showHoldingForm(data) {
  const isEdit = !!data;
  document.getElementById('modalBody').innerHTML = `
    <div class="modal-title">${isEdit ? '编辑持仓' : '添加持仓'}</div>
    <form onsubmit="return saveHolding(this, ${isEdit ? data.id : 'null'})">
      <div class="form-row"><div class="form-group"><label>代码</label><input id="f_code" value="${isEdit?data.code:''}" required></div>
      <div class="form-group"><label>名称</label><input id="f_name" value="${isEdit?data.name:''}" required></div></div>
      <div class="form-row"><div class="form-group"><label>交易所</label><select id="f_market"><option value="sz" ${isEdit&&data.market==='sz'?'selected':''}>深圳 sz</option><option value="sh" ${isEdit&&data.market==='sh'?'selected':''}>上海 sh</option></select></div>
      <div class="form-group"><label>股数</label><input type="number" id="f_shares" value="${isEdit?data.shares:''}" required></div></div>
      <div class="form-group"><label>成本价</label><input type="number" step="0.01" id="f_cost" value="${isEdit?data.cost_per_share:''}" required></div>
      <div class="form-row"><button type="submit" class="btn btn-primary" style="flex:1">保存</button>
      <button type="button" class="btn btn-cancel" onclick="closeModal()">取消</button></div>
    </form>`;
  document.getElementById('modal').classList.add('show');
}
function saveHolding(form, id) {
  const d = {code: document.getElementById('f_code').value, name: document.getElementById('f_name').value, market: document.getElementById('f_market').value, shares: parseInt(document.getElementById('f_shares').value), cost_per_share: parseFloat(document.getElementById('f_cost').value)};
  const p = id ? api('PUT', `/holdings/${id}`, d) : api('POST', '/holdings', d);
  p.then(() => { closeModal(); loadHoldings(); refreshAll(); });
  return false;
}
function deleteHolding(id) {
  if (!confirm('确定删除？')) return;
  api('DELETE', `/holdings/${id}`).then(() => { loadHoldings(); refreshAll(); });
}

// === Stock Detail ===
function showStock(code) {
  api('GET', `/analysis/detail/${code}`).then(d => {
    if (!d || !d.price) { alert('暂无数据'); return; }
    const bulls = (d.bull_signals||[]).map(s => `<span class="signal-chip bull">✓ ${s}</span>`).join('');
    const bears = (d.bear_signals||[]).map(s => `<span class="signal-chip bear">✗ ${s}</span>`).join('');
    const kdj = d.kdj || {};
    const boll = d.boll || {};
    const vol = d.vol || {};
    const mas = d.mas || {};
    const macd = d.macd || {};
    const ins = d.insight || {};

    document.getElementById('modalBody').innerHTML = `
      <div class="modal-title">📈 ${ins.name||d.name||code} 分析</div>
      <div style="text-align:center;margin-bottom:12px">
        <span style="font-size:28px;font-weight:700" class="${d.bias==='强势'||d.bias==='偏多'?'up':d.bias==='偏空'||d.bias==='弱势'?'down':''}">${d.price.toFixed(2)}</span>
        <span class="tag ${d.score>0?'up':d.score<0?'down':'neutral'}" style="font-size:14px;padding:4px 12px;margin-left:8px">评分${d.score>0?'+':''}${d.score} ${d.bias}</span>
      </div>
      ${ins.status || ins.position ? `<div style="text-align:center;margin-bottom:12px">
        ${ins.status ? `<span class="tag ${ins.pnl_pct<=-5?'down':ins.pnl_pct>0?'up':'neutral'}">${ins.status}</span>` : ''}
        ${ins.position ? `<span class="tag neutral" style="margin-left:6px">${ins.position}</span>` : ''}
        ${ins.pnl_value ? `<span style="font-size:13px;color:#666;margin-left:8px">浮亏${ins.pnl_value>0?'+':''}${ins.pnl_value.toFixed(0)}</span>` : ''}
      </div>` : ''}
      ${ins.intraday_analysis ? `<div style="font-size:13px;color:#555;padding:8px 12px;background:#fafafa;border-radius:8px;margin-bottom:12px">📊 ${ins.intraday_analysis}</div>` : ''}
      <div class="tech-mini" style="grid-template-columns:repeat(2,1fr);margin-bottom:8px">
        <div>MA5<span class="v">${mas.ma5||'--'}</span></div>
        <div>MA10<span class="v">${mas.ma10||'--'}</span></div>
        <div>MA20<span class="v">${mas.ma20||'--'}</span></div>
        <div>均线<span class="v">${d.ma_status||'--'}</span></div>
      </div>
      <div class="tech-mini" style="grid-template-columns:repeat(3,1fr);margin-bottom:8px">
        <div>MACD<span class="v ${macd.trend==='偏多'?'up':'down'}">${macd.bar?macd.bar.toFixed(2):'--'}</span></div>
        <div>DIF<span class="v">${macd.dif?macd.dif.toFixed(2):'--'}</span></div>
        <div>DEA<span class="v">${macd.dea?macd.dea.toFixed(2):'--'}</span></div>
        <div>K${kdj.k||'--'}<span style="color:#999">/${kdj.d||'--'}</span></div>
        <div>J<span class="v">${kdj.j||'--'}</span></div>
        <div>KDJ<span class="tag ${kdj.cross==='金叉'?'up':kdj.cross==='死叉'?'down':'neutral'}">${kdj.cross||'--'}</span></div>
        <div>上轨<span class="v">${boll.upper||'--'}</span></div>
        <div>中轨<span class="v">${boll.mid||'--'}</span></div>
        <div>下轨<span class="v">${boll.lower||'--'}</span></div>
        <div>布林位<span class="v">${boll.position!==undefined?boll.position+'%':'--'}</span></div>
        <div>RSI<span class="v">${d.rsi||'--'}</span></div>
        <div>量比<span class="v">${vol.ratio||'--'}</span></div>
      </div>
      ${(ins.key_points||[]).length ? `<div style="margin-bottom:8px"><b style="font-size:12px">👀 关注点</b><div style="margin-top:4px">${ins.key_points.map(k => `<span class="signal-chip">${k}</span>`).join(' ')}</div></div>` : ''}
      ${ins.forward_advice ? `<div style="font-size:14px;font-weight:600;padding:10px 14px;background:#f0f4ff;border-radius:8px;color:#1a1a2e;margin-bottom:8px">${ins.forward_advice}</div>` : ''}
      ${bulls+bears ? `<div style="margin-top:8px"><b style="font-size:12px">📡 信号</b><div style="margin-top:4px">${bulls} ${bears}</div></div>` : ''}
      <div style="margin-top:12px"><button class="btn btn-cancel" style="width:100%" onclick="closeModal()">关闭</button></div>`;
    document.getElementById('modal').classList.add('show');
  }).catch(() => alert('获取分析失败'));
}

// === Settings ===
function loadSettings() {
  api('GET', '/auth/me').then(u => { document.getElementById('userDetail').textContent = `昵称: ${u.nickname||'未设置'} | ID: ${u.id}`; }).catch(() => {});
  api('GET', '/notify/config').then(c => { document.getElementById('wechatUrl').value = c.wechat_webhook||''; document.getElementById('dingtalkUrl').value = c.dingtalk_webhook||''; document.getElementById('atMobiles').value = (c.at_mobiles||[]).join(','); }).catch(() => {});
}
function saveNotify() {
  api('PUT', '/notify/config', {wechat_webhook: document.getElementById('wechatUrl').value, dingtalk_webhook: document.getElementById('dingtalkUrl').value, at_mobiles: document.getElementById('atMobiles').value.split(',').map(s=>s.trim()).filter(Boolean)}).then(() => alert('保存成功')).catch(() => alert('保存失败'));
}
function closeModal() { document.getElementById('modal').classList.remove('show'); }

document.addEventListener('DOMContentLoaded', () => {
  if (token) { showApp(); refreshAll(); }
  else showLogin();
});
</script>
</body>
</html>

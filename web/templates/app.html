<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>盯盘助手</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📊</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Fira+Code:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#020617;--bg-soft:#0a0f1e;
  --card:#0E1223;--card-hover:#131829;
  --border:rgba(255,255,255,0.06);
  --text:#F8FAFC;--text2:#94A3B8;--text3:#64748B;
  --green:#22C55E;--red:#EF4444;--blue:#3B82F6;--purple:#8B5CF6;
  --gradient:linear-gradient(135deg,#3B82F6,#8B5CF6);
  --radius:12px;--radius-lg:16px;
  --font:'IBM Plex Sans',-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;
  --mono:'Fira Code','SF Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;line-height:1.55;min-height:100vh;-webkit-font-smoothing:antialiased}
.header{background:var(--card);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100}
.header h1{font-size:18px;font-weight:700;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-.02em}
.container{padding:12px 14px;max-width:640px;margin:0 auto}
.card{background:var(--card);border-radius:var(--radius-lg);padding:18px;margin-bottom:12px;border:1px solid var(--border);transition:all .2s}
.card-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;padding-bottom:10px;border-bottom:1px solid var(--border)}
.price{font-weight:600;font-variant-numeric:tabular-nums}
.up{color:var(--red)}.down{color:var(--green)}
.tag{display:inline-block;padding:2px 10px;border-radius:20px;font-size:12px;font-weight:500}
.tag.up{background:rgba(239,68,68,0.12);color:var(--red)}
.tag.down{background:rgba(34,197,94,0.12);color:var(--green)}
.tag.neutral{background:rgba(148,163,184,0.12);color:var(--text3)}
.btn{display:inline-block;padding:10px 20px;border:none;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;transition:all .2s;text-align:center;font-family:inherit}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--gradient);color:#fff;width:100%;box-shadow:0 4px 16px rgba(59,130,246,0.2)}
.btn-primary:hover{box-shadow:0 6px 20px rgba(59,130,246,0.3)}
.btn-sm{padding:5px 12px;font-size:12px;border-radius:8px;border:none;cursor:pointer;background:rgba(59,130,246,0.12);color:var(--blue);font-weight:500;transition:all .2s;font-family:inherit}
.btn-sm:hover{background:rgba(59,130,246,0.2)}
.btn-danger{padding:5px 12px;font-size:12px;border-radius:8px;border:none;cursor:pointer;background:rgba(239,68,68,0.12);color:var(--red);font-weight:500;font-family:inherit}
.btn-cancel{padding:10px 20px;border:none;border-radius:10px;font-size:14px;cursor:pointer;background:rgba(148,163,184,0.1);color:var(--text2);transition:all .2s;font-family:inherit}
.btn-cancel:hover{background:rgba(148,163,184,0.2)}
input,select{width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:10px;font-size:14px;margin-bottom:10px;background:rgba(14,18,35,0.8);color:var(--text);transition:all .2s;font-family:inherit}
input:focus,select:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(59,130,246,0.12)}
label{display:block;font-size:13px;color:var(--text2);margin-bottom:5px;font-weight:500}
.form-group{margin-bottom:14px}
.form-row{display:flex;gap:10px}.form-row>*{flex:1}
.modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);z-index:200;align-items:center;justify-content:center}
.modal.show{display:flex}
.modal-content{background:var(--card);border-radius:var(--radius-lg);padding:24px;width:92%;max-width:440px;max-height:85vh;overflow-y:auto;border:1px solid var(--border);box-shadow:0 24px 48px rgba(0,0,0,0.4)}
.modal-title{font-size:17px;font-weight:700;margin-bottom:16px;color:var(--text)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{padding:10px 6px;color:var(--text3);font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border)}
td{padding:12px 6px;border-bottom:1px solid var(--border)}
tr:last-child td{border-bottom:none}
.loading{text-align:center;padding:48px 0;color:var(--text3);font-size:14px}
.empty-state{text-align:center;padding:48px 0;color:var(--text3);font-size:14px}
.tab-bar{display:flex;gap:6px;padding:10px 0 8px;margin-bottom:4px;position:sticky;top:56px;z-index:90;background:rgba(2,6,23,0.93);backdrop-filter:blur(12px)}
.tab{flex:1;text-align:center;padding:10px 0;font-size:14px;font-weight:500;color:var(--text3);cursor:pointer;border:none;background:rgba(148,163,184,0.06);border-radius:10px;transition:all .2s;font-family:inherit}
.tab:hover{background:rgba(148,163,184,0.12);color:var(--text2)}
.tab.active{background:var(--gradient);color:#fff;font-weight:600;box-shadow:0 4px 12px rgba(59,130,246,0.2)}
.page{display:none}.page.active{display:block}
.flow-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin:8px 0}
.flow-item{background:rgba(148,163,184,0.06);border-radius:10px;padding:10px 4px;text-align:center;transition:all .2s}
.flow-item .val{font-size:15px;font-weight:700;font-variant-numeric:tabular-nums}
.flow-item .lbl{font-size:10px;color:var(--text3);margin-top:3px}
.tech-mini{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin:6px 0}
.tech-mini>div{background:rgba(148,163,184,0.04);border-radius:8px;padding:8px 4px;text-align:center;font-size:11px;color:var(--text3);transition:all .2s}
.tech-mini .v{display:block;font-weight:600;font-size:13px;color:var(--text);margin-top:2px;font-variant-numeric:tabular-nums}
.signal-chip{display:inline-block;font-size:11px;padding:3px 10px;border-radius:20px;margin:2px 3px 2px 0;font-weight:500;background:rgba(148,163,184,0.08);color:var(--text2)}
.signal-chip.bull{background:rgba(34,197,94,0.08);color:var(--green)}
.signal-chip.bear{background:rgba(239,68,68,0.08);color:var(--red)}
.board-list{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.board-item{display:flex;justify-content:space-between;padding:6px 12px;border-radius:8px;font-size:12px;background:rgba(148,163,184,0.04);align-items:center}
.advice-box{font-size:13px;font-weight:500;padding:12px 16px;background:linear-gradient(135deg,rgba(59,130,246,0.06),rgba(139,92,246,0.06));border-radius:10px;color:var(--text);border-left:3px solid var(--blue);line-height:1.7}
.holding-meta{display:grid;grid-template-columns:1fr 1fr;gap:4px 12px;font-size:13px;color:var(--text2);margin-bottom:8px;background:rgba(148,163,184,0.03);border-radius:10px;padding:10px 14px}
.holding-meta span{display:flex;justify-content:space-between}
.holding-meta span::after{content:attr(data-val);font-weight:600;color:var(--text);font-variant-numeric:tabular-nums}
.summary-text{font-size:14px;line-height:1.8;color:var(--text2)}
.divider{height:1px;background:var(--border);margin:14px 0}
.pnl-large{font-size:22px;font-weight:700;text-align:center;padding:14px;letter-spacing:.5px;font-variant-numeric:tabular-nums}
.price-large{font-size:20px;font-weight:700;font-variant-numeric:tabular-nums}
.progress-bar{flex:1;height:8px;background:rgba(148,163,184,0.08);border-radius:4px;overflow:hidden}
.progress-fill{height:100%;background:var(--gradient);border-radius:4px;transition:width .5s}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:linear-gradient(180deg,#3B82F6,#8B5CF6);border-radius:3px}
@keyframes fadeIn{0%{opacity:0;transform:translateY(8px)}100%{opacity:1;transform:translateY(0)}}
.card{animation:fadeIn .3s ease-out}
@media(max-width:480px){.header h1{font-size:15px}.card{padding:12px}.card-title{font-size:13px}.tab{font-size:12px;padding:8px 0}.flow-grid{grid-template-columns:repeat(3,1fr)}.holding-meta{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>

<div class="header">
  <h1>📊 盯盘助手</h1>
  <span style="font-size:12px;color:var(--text3)" id="userInfo">加载中...</span>
</div>

<div class="container" id="appMain">

  <!-- DASHBOARD -->
  <div id="pageDashboard" class="page active">
    <div class="card" style="padding:10px 14px;margin-bottom:10px">
      <div style="position:relative">
        <input id="stockSearch" placeholder="输入代码或名称搜索，如 600519 / 贵州茅台 / 002920"
          style="width:100%;padding:12px 16px;border-radius:12px;border:1px solid var(--border);background:rgba(14,18,35,0.8);font-size:15px;font-family:inherit;box-sizing:border-box;margin:0;transition:all .2s"
          oninput="onStockSearch(this.value)" onblur="setTimeout(function(){document.getElementById('searchResults').style.display='none'},400)" onfocus="if(this.value)onStockSearch(this.value)">
        <div id="searchResults" style="display:none;position:absolute;top:100%;left:0;right:0;background:var(--card);border-radius:12px;border:1px solid var(--border);box-shadow:0 12px 32px rgba(0,0,0,0.4);z-index:999;max-height:400px;overflow-y:auto;margin-top:4px"></div>
      </div>
    </div>
    <div id="dbLoading" class="loading">加载中...</div>
    <div id="dbContent" style="display:none">
      <div class="card">
        <div class="card-title">📊 大盘指数</div>
        <table id="idxTable"><tr><th>指数</th><th style="text-align:right">点位</th><th style="text-align:right">涨跌幅</th></tr></table>
      </div>
      <div class="card" id="extraCard">
        <div class="card-title">📂 板块 & 资金</div>
        <div id="extraContent"></div>
      </div>
      <div class="card" id="summaryCard">
        <div class="card-title">📝 市场总结</div>
        <div id="summaryText" style="font-size:14px;line-height:1.8;color:var(--text2)"></div>
      </div>
    </div>
    <div id="dbError" class="empty-state" style="display:none">数据加载失败，请刷新重试</div>
  </div>

  <!-- HOLDINGS -->
  <div id="pageHoldings" class="page">
    <button class="btn btn-primary" onclick="showHoldingForm()">+ 添加持仓</button>
    <div id="hlLoading" class="loading">加载中...</div>
    <div id="hlContent" style="display:none">
      <div class="card" id="pnlCard" style="margin-top:12px">
        <div id="pnlTotal" class="pnl-large up">总持仓盈亏：-- 元</div>
      </div>
      <div id="hlCards"></div>
    </div>
    <div id="hlEmpty" class="empty-state" style="display:none">
      <p>还没有持仓，点击上方按钮添加</p>
    </div>
  </div>

  <!-- PORTFOLIO -->
  <div id="pagePortfolio" class="page">
    <div id="pfLoading" class="loading">加载组合分析中...</div>
    <div id="pfContent" style="display:none">
      <div class="card"><div class="card-title">🎯 组合概览</div><div id="pfOverview"></div></div>
      <div class="card"><div class="card-title">📂 行业集中度</div><div id="pfSector"></div></div>
      <div class="card"><div class="card-title">⚖️ 仓位合理性</div><div id="pfPosition"></div></div>
      <div class="card"><div class="card-title">🔗 持仓相关性</div><div id="pfCorrelation"></div></div>
      <div class="card"><div class="card-title">🛡️ 安全性评估</div><div id="pfSafety"></div></div>
      <div class="card"><div class="card-title">💡 调仓建议</div><div id="pfSuggestions"></div></div>
    </div>
    <div id="pfEmpty" class="empty-state" style="display:none">
      <p>还没有持仓，无法分析组合</p>
      <button class="btn btn-primary" style="width:auto;margin-top:12px" onclick="switchTab('holdings')">添加持仓</button>
    </div>
  </div>

  <!-- SETTINGS -->
  <div id="pageSettings" class="page">
    <div class="card">
      <div class="card-title">👤 用户信息</div>
      <p id="userDetail" style="font-size:13px;color:var(--text2)">加载中...</p>
    </div>
    <div class="card">
      <div class="card-title">🔔 通知配置</div>
      <div class="form-group">
        <label>企业微信 Webhook</label>
        <input type="url" id="wechatUrl" placeholder="https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=...">
      </div>
      <div class="form-group">
        <label>钉钉 Webhook</label>
        <input type="url" id="dingtalkUrl" placeholder="https://oapi.dingtalk.com/robot/send?access_token=...">
      </div>
      <div class="form-group">
        <label>@手机号（逗号分隔）</label>
        <input type="text" id="atMobiles" placeholder="13800138000">
      </div>
      <button class="btn btn-primary" onclick="saveNotify()">保存</button>
    </div>
  </div>

</div>

<div class="tab-bar" id="tabBar">
  <button class="tab active" onclick="switchTab('dashboard')">📊 分析</button>
  <button class="tab" onclick="switchTab('holdings')">📋 持仓</button>
  <button class="tab" onclick="switchTab('portfolio')">🎯 组合</button>
  <button class="tab" onclick="switchTab('settings')">⚙️ 设置</button>
</div>

<div class="modal" id="modal">
  <div class="modal-content" id="modalBody"></div>
</div>

<script>
var API = '/api';

function api(method, path, data) {
  var hdrs = { 'Content-Type': 'application/json' };
  return fetch(API + path, { method: method, headers: hdrs, body: data ? JSON.stringify(data) : undefined })
    .then(function(r) {
      return r.json().then(function(d) { return r.ok ? d : Promise.reject(d); });
    });
}

// TAB
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
  document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
  document.getElementById('page' + tab[0].toUpperCase() + tab.slice(1)).classList.add('active');
  var tabs = document.querySelectorAll('.tab');
  var labels = { dashboard: '分析', holdings: '持仓', portfolio: '组合', settings: '设置' };
  tabs.forEach(function(t) { if (t.textContent.indexOf(labels[tab]) >= 0) t.classList.add('active'); });
  if (tab === 'dashboard') loadDashboard();
  else if (tab === 'holdings') loadHoldings();
  else if (tab === 'portfolio') loadPortfolio();
  else if (tab === 'settings') loadSettings();
}

// DASHBOARD
function loadDashboard() {
  var loading = document.getElementById('dbLoading');
  var content = document.getElementById('dbContent');
  var error = document.getElementById('dbError');
  loading.style.display = 'block'; content.style.display = 'none'; error.style.display = 'none';

  api('GET', '/analysis/market').then(function(m) {
    loading.style.display = 'none'; content.style.display = 'block';

    var nameMap = { sh000001:'上证指数', sz399001:'深证成指', sz399006:'创业板指', sh000688:'科创50' };
    var idxHtml = '<tr><th>指数</th><th style="text-align:right">点位</th><th style="text-align:right">趋势</th></tr>';
    if (m.index_tech) {
      Object.entries(m.index_tech).forEach(function(e) {
        var name = nameMap[e[0]] || e[0];
        var t = e[1];
        var arrow = t.ma_status === '多头' ? '↑' : t.ma_status === '空头' ? '↓' : '→';
        var cls = t.ma_status === '多头' ? 'up' : t.ma_status === '空头' ? 'down' : '';
        idxHtml += '<tr><td><b>'+name+'</b></td><td style="text-align:right">'+(t.price||0).toFixed(2)+'</td><td style="text-align:right"><span class="'+cls+'">'+arrow+' '+t.ma_status+'</span></td></tr>';
      });
    }
    document.getElementById('idxTable').innerHTML = idxHtml;

    var ec = document.getElementById('extraContent');
    ec.innerHTML = '';
    var flow = m.sentiment && m.sentiment.fund_flow;
    if (flow) {
      var items = [{l:'主力',v:flow.main_net},{l:'超大单',v:flow.super_large_net},{l:'大单',v:flow.large_net},{l:'中单',v:flow.medium_net},{l:'小单',v:flow.small_net}];
      ec.innerHTML += '<div style="margin-bottom:12px"><b style="font-size:12px;color:var(--text2)">💰 资金流向（亿）</b><div class="flow-grid">' +
        items.map(function(x) { return '<div class="flow-item"><div class="val '+(x.v>=0?'up':'down')+'">'+(x.v>0?'+':'')+x.v+'</div><div class="lbl">'+x.l+'</div></div>'; }).join('') +
        '</div></div>';
    }
    var boards = m.top_boards || {};
    if ((boards.top||[]).length) {
      ec.innerHTML += '<b style="font-size:12px;color:var(--text2)">📂 领涨板块</b><div class="board-list" style="margin-top:4px">' +
        (boards.top||[]).slice(0,6).map(function(b) { return '<div class="board-item"><span>'+b.name+'</span><span class="tag up">+'+b.change_pct+'%</span></div>'; }).join('') +
        '</div>';
    }

    var parts = [];
    var idxInfo = m.index_tech || {};
    var vals = Object.values(idxInfo);
    var bulls = vals.filter(function(t) { return t.ma_status === '多头'; });
    var bears = vals.filter(function(t) { return t.ma_status === '空头'; });
    if (bears.length > bulls.length) parts.push('大盘偏弱，多数指数空头排列。');
    else if (bulls.length > bears.length) parts.push('大盘偏强，多数指数多头排列。');
    else parts.push('市场分化，多空交织。');
    if (flow) parts.push('主力资金净'+(flow.main_net>=0?'入':'出')+Math.abs(flow.main_net||0).toFixed(1)+'亿。');
    document.getElementById('summaryText').textContent = parts.join('');
  }).catch(function() { loading.style.display = 'none'; error.style.display = 'block'; });
}

// HOLDINGS
function loadHoldings() {
  var loading = document.getElementById('hlLoading');
  var content = document.getElementById('hlContent');
  var empty = document.getElementById('hlEmpty');
  loading.style.display = 'block'; content.style.display = 'none'; empty.style.display = 'none';

  api('GET', '/holdings').then(function(h) {
    if (!h.length) { loading.style.display = 'none'; empty.style.display = 'block'; return; }
    api('GET', '/analysis/report').then(function(report) {
      loading.style.display = 'none'; content.style.display = 'block';

      var totalPnl = report.summary ? (report.summary.total_pnl || 0) : 0;
      var pnlEl = document.getElementById('pnlTotal');
      pnlEl.textContent = '总持仓盈亏：' + (totalPnl >= 0 ? '+' : '') + totalPnl.toFixed(0) + ' 元';
      pnlEl.className = 'pnl-large ' + (totalPnl >= 0 ? 'up' : 'down');

      var insights = report.insights || {};
      var liveMap = {};
      (report.holdings || []).forEach(function(hh) { liveMap[hh.code] = hh; });

      var hlHtml = '';
      h.forEach(function(x) {
        var live = liveMap[x.code] || {};
        var ins = insights[x.code] || {};
        var price = live.price || 0;
        var chg = live.change_pct || 0;
        var pnl = ins.pnl_value || 0;

        hlHtml += '<div class="card">' +
          '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">' +
            '<div><b style="font-size:16px">' + x.name + '</b> <span style="color:var(--text3);font-size:12px">' + x.code + '</span></div>' +
            '<div><span class="price-large ' + (chg >= 0 ? 'up' : 'down') + '">' + price.toFixed(2) + '</span> <span class="tag ' + (chg >= 0 ? 'up' : 'down') + '">' + (chg >= 0 ? '+' : '') + chg.toFixed(2) + '%</span></div>' +
          '</div>' +
          '<div class="holding-meta">' +
            '<span data-val="' + x.shares + '股">持仓</span>' +
            '<span data-val="' + x.cost_per_share.toFixed(2) + '">均价</span>' +
            '<span data-val="' + (live.low ? live.low.toFixed(2) + ' ~ ' + live.high.toFixed(2) : '--') + '">日内波幅</span>' +
            '<span data-val="' + (pnl >= 0 ? '+' : '') + pnl.toFixed(0) + '" class="' + (pnl > 0 ? 'up' : pnl < 0 ? 'down' : '') + '">浮' + (pnl >= 0 ? '盈' : '亏') + '</span>' +
          '</div>';

        if (ins.status || ins.position) {
          hlHtml += '<div style="margin-bottom:8px;display:flex;gap:6px">' +
            (ins.status ? '<span class="tag ' + (ins.pnl_pct <= -5 ? 'down' : ins.pnl_pct > 0 ? 'up' : 'neutral') + '">' + ins.status + '</span>' : '') +
            (ins.position ? '<span class="tag neutral">' + ins.position + '</span>' : '') + '</div>';
        }
        if (ins.intraday_analysis) hlHtml += '<div style="font-size:13px;color:var(--text2);margin-bottom:6px">📊 ' + ins.intraday_analysis + '</div>';
        if (ins.tech_summary) hlHtml += '<div style="font-size:12px;color:var(--text3);margin-bottom:8px">🔧 ' + ins.tech_summary + '</div>';
        if ((ins.key_points || []).length) {
          hlHtml += '<div style="font-size:13px;margin-bottom:8px">' + ins.key_points.map(function(k) { return '<span class="signal-chip">' + k + '</span>'; }).join(' ') + '</div>';
        }
        if (ins.forward_advice) hlHtml += '<div class="advice-box">💡 ' + ins.forward_advice + '</div>';

        hlHtml += '<div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px">' +
          '<div>' +
            '<button class="btn-sm" onclick="event.stopPropagation();showHoldingForm(' + JSON.stringify(x).replace(/"/g,'&quot;') + ')">编辑</button> ' +
            '<button class="btn-danger" onclick="event.stopPropagation();deleteHolding(' + x.id + ')">删除</button>' +
          '</div>' +
          '<button class="btn-sm" onclick="showStock(\'' + x.code + '\')">详细分析 →</button>' +
        '</div></div>';
      });
      document.getElementById('hlCards').innerHTML = hlHtml;
    }).catch(function() { loading.style.display = 'none'; empty.style.display = 'block'; });
  }).catch(function() { loading.style.display = 'none'; empty.style.display = 'block'; });
}

// PORTFOLIO
function loadPortfolio() {
  var loading = document.getElementById('pfLoading');
  var content = document.getElementById('pfContent');
  var empty = document.getElementById('pfEmpty');
  loading.style.display = 'block'; content.style.display = 'none'; empty.style.display = 'none';

  api('GET', '/analysis/portfolio').then(function(d) {
    loading.style.display = 'none';
    if (d.error) { empty.style.display = 'block'; return; }
    content.style.display = 'block';

    var riskColors = { '高风险':'up','中高风险':'up','中风险':'','中低风险':'down','低风险':'down' };
    document.getElementById('pfOverview').innerHTML =
      '<div class="flow-grid" style="grid-template-columns:1fr 1fr 1fr">' +
        '<div class="flow-item"><div class="val">'+(d.total_value||0).toFixed(2)+'</div><div class="lbl">总市值</div></div>' +
        '<div class="flow-item"><div class="val '+(riskColors[d.risk_level]||'')+'">'+d.risk_level+'</div><div class="lbl">风险等级</div></div>' +
        '<div class="flow-item"><div class="val">'+(d.diversification_score||0)+'分</div><div class="lbl">分散度评分</div></div>' +
      '</div>';

    var sector = d.sector_concentration || {};
    var keys = Object.keys(sector).filter(function(k) { return k[0] !== '_'; });
    if (keys.length) {
      var maxS = Math.max.apply(null, keys.map(function(k) { return sector[k]; }));
      document.getElementById('pfSector').innerHTML =
        keys.map(function(k) {
          return '<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">' +
            '<span style="width:80px;font-size:13px">'+k+'</span>' +
            '<div class="progress-bar"><div class="progress-fill" style="width:'+(sector[k]/maxS*70)+'%"></div></div>' +
            '<span style="width:50px;text-align:right;font-weight:600;font-size:13px">'+sector[k]+'%</span></div>';
        }).join('') + '<div style="margin-top:6px;font-size:12px;color:var(--text2)">行业分布: '+sector._judgment+'</div>';
    }

    var pos = d.single_stock_weight || [];
    if (pos.length) {
      document.getElementById('pfPosition').innerHTML = pos.map(function(p) {
        return '<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)">' +
          '<span><b>'+p.name+'</b> <span style="color:var(--text3);font-size:12px">'+p.code+'</span></span>' +
          '<div style="text-align:right"><span style="font-weight:600;font-size:15px">'+p.weight+'%</span>' +
          (p.advice?'<br><span style="font-size:11px;color:var(--text2)">'+p.advice+'</span>':'')+'</div></div>';
      }).join('');
    }

    if (d.correlation_analysis) {
      document.getElementById('pfCorrelation').innerHTML = '<div style="font-size:13px;color:var(--text2);line-height:1.7">'+d.correlation_analysis+'</div>';
    }

    var saf = d.safety_assessment || {};
    if (saf.assessment) {
      document.getElementById('pfSafety').innerHTML =
        '<div class="tech-mini" style="grid-template-columns:repeat(3,1fr)">' +
          '<div>总盈亏<span class="v '+(saf.total_unrealized_pnl>=0?'up':'down')+'">'+(saf.total_unrealized_pnl>0?'+':'')+(saf.total_unrealized_pnl||0).toFixed(0)+'</span></div>' +
          '<div>平均盈亏<span class="v '+(saf.avg_pnl_pct>=0?'up':'down')+'">'+(saf.avg_pnl_pct>0?'+':'')+(saf.avg_pnl_pct||0).toFixed(2)+'%</span></div>' +
          '<div>最大回撤<span class="v down">'+(saf.max_drawdown||0).toFixed(2)+'%</span></div>' +
        '</div><div style="font-size:13px;color:var(--text2);margin-top:8px">'+saf.assessment+'</div>';
    }

    var sugs = d.rebalance_suggestions || [];
    if (sugs.length) {
      document.getElementById('pfSuggestions').innerHTML = sugs.map(function(s) { return '<div class="advice-box" style="margin-bottom:8px;font-size:13px">💡 '+s+'</div>'; }).join('');
    }
  }).catch(function() { loading.style.display = 'none'; empty.style.display = 'block'; });
}

// SETTINGS
function loadSettings() {
  api('GET', '/auth/me').then(function(u) {
    document.getElementById('userDetail').textContent = '昵称：' + (u.nickname || '未设置') + ' | ID：' + u.id;
  }).catch(function() {});
  api('GET', '/notify/config').then(function(c) {
    document.getElementById('wechatUrl').value = c.wechat_webhook || '';
    document.getElementById('dingtalkUrl').value = c.dingtalk_webhook || '';
    document.getElementById('atMobiles').value = (c.at_mobiles || []).join(',');
  }).catch(function() {});
}

function saveNotify() {
  api('PUT', '/notify/config', {
    wechat_webhook: document.getElementById('wechatUrl').value,
    dingtalk_webhook: document.getElementById('dingtalkUrl').value,
    at_mobiles: document.getElementById('atMobiles').value.split(',').map(function(s) { return s.trim(); }).filter(Boolean)
  }).then(function() { alert('保存成功'); }).catch(function() { alert('保存失败'); });
}

// SEARCH
var searchTimer;
function onStockSearch(query) {
  clearTimeout(searchTimer);
  var el = document.getElementById('searchResults');
  if (!query || query.length < 1) { el.style.display = 'none'; return; }
  searchTimer = setTimeout(function() {
    api('GET', '/stock/search?q=' + encodeURIComponent(query)).then(function(results) {
      if (!results.length) { el.innerHTML = '<div style="padding:12px;text-align:center;color:var(--text3);font-size:13px">无匹配股票</div>'; el.style.display = 'block'; return; }
      el.innerHTML = results.map(function(s) {
        return '<div style="padding:10px 14px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);transition:background .15s" onmouseover="this.style.background=\'rgba(255,255,255,0.03)\'" onmouseout="this.style.background=\'\'" onclick="showStock(\''+s.code+'\')"><span><b>'+s.name+'</b> <span style="color:var(--text3);font-size:12px">'+s.code+'</span></span><span style="font-size:11px;color:var(--text3)">'+(s.market==='sh'?'沪':s.market==='sz'?'深':'京')+'</span></div>';
      }).join('');
      el.style.display = 'block';
    }).catch(function() {});
  }, 200);
}

// STOCK DETAIL
function showStock(code) {
  api('GET', '/analysis/detail/' + code).then(function(d) {
    if (!d || !d.price) { alert('暂无数据'); return; }
    var bulls = (d.bull_signals||[]).map(function(s) { return '<span class="signal-chip bull">'+s+'</span>'; }).join('');
    var bears = (d.bear_signals||[]).map(function(s) { return '<span class="signal-chip bear">'+s+'</span>'; }).join('');
    var kdj = d.kdj || {}, boll = d.boll || {}, vol = d.vol || {}, mas = d.mas || {}, macd = d.macd || {}, ins = d.insight || {};

    document.getElementById('modalBody').innerHTML =
      '<div class="modal-title">📈 '+(ins.name||code)+' 技术分析</div>' +
      '<div style="text-align:center;margin-bottom:12px">' +
        '<span style="font-size:28px;font-weight:700" class="'+(d.bias==='强势'||d.bias==='偏多'?'up':d.bias==='偏空'||d.bias==='弱势'?'down':'')+'">'+d.price.toFixed(2)+'</span>' +
        '<span class="tag '+(d.score>0?'up':d.score<0?'down':'neutral')+'" style="font-size:14px;padding:4px 12px;margin-left:8px">评分'+(d.score>0?'+':'')+d.score+' '+d.bias+'</span>' +
      '</div>' +
      (ins.status||ins.position ? '<div style="text-align:center;margin-bottom:12px">'+
        (ins.status?'<span class="tag '+(ins.pnl_pct<=-5?'down':ins.pnl_pct>0?'up':'neutral')+'">'+ins.status+'</span>':'')+
        (ins.position?'<span class="tag neutral" style="margin-left:6px">'+ins.position+'</span>':'')+
        (ins.pnl_value?'<span style="font-size:13px;color:var(--text2);margin-left:8px">浮亏'+(ins.pnl_value>0?'+':'')+ins.pnl_value.toFixed(0)+'</span>':'')+
      '</div>' : '') +
      (ins.intraday_analysis?'<div style="font-size:13px;color:var(--text2);padding:8px 12px;background:rgba(148,163,184,0.04);border-radius:8px;margin-bottom:12px">📊 '+ins.intraday_analysis+'</div>':'') +
      '<div class="tech-mini" style="grid-template-columns:repeat(2,1fr);margin-bottom:8px">'+
        '<div>MA5<span class="v">'+(mas.ma5?mas.ma5.toFixed(2):'--')+'</span></div>'+
        '<div>MA10<span class="v">'+(mas.ma10?mas.ma10.toFixed(2):'--')+'</span></div>'+
        '<div>MA20<span class="v">'+(mas.ma20?mas.ma20.toFixed(2):'--')+'</span></div>'+
        '<div>均线<span class="v">'+(d.ma_status||'--')+'</span></div>'+
      '</div>' +
      '<div class="tech-mini" style="grid-template-columns:repeat(3,1fr);margin-bottom:8px">'+
        '<div>MACD<span class="v '+(macd.trend==='偏多'?'up':'down')+'">'+(typeof macd.bar==='number'?macd.bar.toFixed(2):'--')+'</span></div>'+
        '<div>DIF<span class="v">'+(typeof macd.dif==='number'?macd.dif.toFixed(2):'--')+'</span></div>'+
        '<div>DEA<span class="v">'+(typeof macd.dea==='number'?macd.dea.toFixed(2):'--')+'</span></div>'+
        '<div>K'+(kdj.k||'--')+'<span style="color:var(--text3)">/'+(kdj.d||'--')+'</span></div>'+
        '<div>J<span class="v">'+(kdj.j||'--')+'</span></div>'+
        '<div>KDJ<span class="tag '+(kdj.cross==='金叉'?'up':kdj.cross==='死叉'?'down':'neutral')+'">'+(kdj.cross||'--')+'</span></div>'+
        '<div>上轨<span class="v">'+(boll.upper||'--')+'</span></div>'+
        '<div>中轨<span class="v">'+(boll.mid||'--')+'</span></div>'+
        '<div>下轨<span class="v">'+(boll.lower||'--')+'</span></div>'+
        '<div>布林位<span class="v">'+(boll.position!==undefined?boll.position+'%':'--')+'</span></div>'+
        '<div>RSI<span class="v">'+(d.rsi||'--')+'</span></div>'+
        '<div>量比<span class="v">'+(vol.ratio||'--')+'</span></div>'+
      '</div>' +
      ((ins.key_points||[]).length?'<div style="margin-bottom:8px"><b style="font-size:12px">👀 关注点</b><div style="margin-top:4px">'+ins.key_points.map(function(k){return '<span class="signal-chip">'+k+'</span>';}).join(' ')+'</div></div>':'') +
      (ins.forward_advice?'<div class="advice-box">💡 '+ins.forward_advice+'</div>':'') +
      (bulls+bears?'<div style="margin-top:8px"><b style="font-size:12px">📡 信号</b><div style="margin-top:4px">'+bulls+' '+bears+'</div></div>':'') +
      '<div style="margin-top:16px"><button class="btn-cancel" style="width:100%" onclick="closeModal()">关闭</button></div>';
    document.getElementById('modal').classList.add('show');
  }).catch(function() { alert('获取分析失败'); });
}

// HOLDING FORM
function showHoldingForm(data) {
  var isEdit = !!data;
  var d = data || {};
  document.getElementById('modalBody').innerHTML =
    '<div class="modal-title">'+(isEdit?'编辑持仓':'添加持仓')+'</div>' +
    '<div style="margin-bottom:14px"><label>搜索股票</label>' +
      '<div style="position:relative">' +
        '<input id="f_stockSearch" placeholder="输入代码或名称搜索" style="width:100%;padding:12px 14px;border-radius:10px;border:1px solid var(--border);font-size:15px;font-family:inherit;box-sizing:border-box"' +
        ' oninput="onStockSelect(this.value)" onblur="setTimeout(function(){document.getElementById(\'f_stockResults\').style.display=\'none\'},300)">' +
        '<div id="f_stockResults" style="display:none;position:absolute;top:100%;left:0;right:0;background:var(--card);border-radius:10px;border:1px solid var(--border);box-shadow:0 12px 32px rgba(0,0,0,0.4);z-index:999;max-height:300px;overflow-y:auto;margin-top:2px"></div>' +
      '</div></div>' +
    '<form onsubmit="return saveHolding(this,\''+(isEdit?d.id:'')+'\')">' +
      '<div class="form-row">' +
        '<div class="form-group"><label>代码</label><input id="f_code" value="'+(isEdit?d.code:'')+'" readonly style="background:rgba(148,163,184,0.08)"></div>' +
        '<div class="form-group"><label>名称</label><input id="f_name" value="'+(isEdit?d.name:'')+'" readonly style="background:rgba(148,163,184,0.08)"></div>' +
      '</div>' +
      '<div class="form-row">' +
        '<div class="form-group"><label>交易所</label><input id="f_market" value="'+(isEdit?d.market:'')+'" readonly style="background:rgba(148,163,184,0.08)"></div>' +
        '<div class="form-group"><label>股数</label><input type="number" id="f_shares" value="'+(isEdit?d.shares:'')+'" required></div>' +
      '</div>' +
      '<div class="form-group"><label>成本价</label><input type="number" step="0.01" id="f_cost" value="'+(isEdit?d.cost_per_share:'')+'" required></div>' +
      '<div class="form-row">' +
        '<button type="submit" class="btn btn-primary" style="flex:1">保存</button>' +
        '<button type="button" class="btn-cancel" onclick="closeModal()">取消</button>' +
      '</div>' +
      '<input type="hidden" id="f_boards" value="'+(d.related_boards||'')+'">' +
    '</form>';
  document.getElementById('modal').classList.add('show');
}

function saveHolding(form, id) {
  var d = {
    code: document.getElementById('f_code').value,
    name: document.getElementById('f_name').value,
    market: document.getElementById('f_market').value,
    shares: parseInt(document.getElementById('f_shares').value),
    cost_per_share: parseFloat(document.getElementById('f_cost').value)
  };
  var boards = document.getElementById('f_boards').value;
  if (boards) { try { d.related_boards = JSON.parse(boards); } catch(e) { d.related_boards = []; } }
  var p = id ? api('PUT', '/holdings/' + id, d) : api('POST', '/holdings', d);
  p.then(function() { closeModal(); loadHoldings(); });
  return false;
}

function onStockSelect(q) {
  if (!q || q.length < 1) { var er = document.getElementById('f_stockResults'); if (er) er.style.display = 'none'; return; }
  api('GET', '/stock/search?q=' + encodeURIComponent(q)).then(function(results) {
    var el = document.getElementById('f_stockResults');
    if (!results.length) { if (el) el.style.display = 'none'; return; }
    el.innerHTML = results.map(function(s) {
      return '<div style="padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center" ' +
        'onmousedown="pickStock(\''+s.code+'\',\''+s.name.replace(/'/g,"\\'")+'\',\''+s.market+'\')" ' +
        'onmouseover="this.style.background=\'rgba(255,255,255,0.03)\'" onmouseout="this.style.background=\'\'">' +
        '<span><b>'+s.name+'</b> <span style="color:var(--text3);font-size:12px">'+s.code+'</span></span>' +
        '<span style="font-size:11px;color:var(--text3)">'+(s.market==='sh'?'沪':s.market==='sz'?'深':'京')+'</span></div>';
    }).join('');
    el.style.display = 'block';
  }).catch(function() {});
}

function pickStock(code, name, market) {
  document.getElementById('f_stockSearch').value = name + ' (' + code + ')';
  document.getElementById('f_code').value = code;
  document.getElementById('f_name').value = name;
  document.getElementById('f_market').value = market;
  document.getElementById('f_stockResults').style.display = 'none';
  api('GET', '/stock/info?code=' + code).then(function(info) {
    if (info && info.boards && info.boards.length) {
      try { document.getElementById('f_boards').value = JSON.stringify(info.boards); } catch(e) {}
    }
  }).catch(function() {});
}

function deleteHolding(id) {
  if (!confirm('确定删除该持仓？')) return;
  api('DELETE', '/holdings/' + id).then(function() { loadHoldings(); });
}

function closeModal() { document.getElementById('modal').classList.remove('show'); }

// INIT
document.addEventListener('DOMContentLoaded', function() {
  api('GET', '/auth/me').then(function(u) {
    document.getElementById('userInfo').textContent = u.nickname || '已登录';
  }).catch(function() {
    document.getElementById('userInfo').textContent = '已登录';
  });
  loadDashboard();
});
</script>
